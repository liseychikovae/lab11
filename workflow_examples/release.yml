name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B _build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build _build
      - run: cd _build && cpack -G TGZ
      - uses: softprops/action-gh-release@v2
        with:
          files: _build/*.tar.gz
